<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김비서 소개</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            color-scheme: light;
        }

        html.dark-mode {
            color-scheme: dark;
        }

        body {
            font-family: 'MS Sans Serif', Arial, sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
            color: #000000;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        /* 모드 토글 - 숨김 */
        .theme-toggle {
            display: none;
        }

        /* 윈도우 98 스타일 카드 */
        .hero-card {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            border-radius: 0;
            padding: 60px 40px;
            box-shadow: none;
            text-align: center;
            color: #000000;
            transition: none;
        }

        .hero-card:hover {
            background: #c0c0c0;
            box-shadow: none;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
            font-weight: 700;
            color: #000000;
            text-shadow: none;
        }

        .intro-text {
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.6;
            opacity: 0.95;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .feature-item {
            background: #ffffff;
            padding: 20px;
            border-radius: 0;
            border: 1px solid #808080;
            text-align: left;
            backdrop-filter: none;
            transition: none;
        }

        .feature-item:hover {
            background: #ffffff;
            border-color: #808080;
            transform: none;
        }

        .feature-item h3 {
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #000000;
        }

        .feature-item p {
            font-size: 14px;
            line-height: 1.5;
            color: #000000;
        }

        .btn-dashboard {
            display: inline-block;
            background: #c0c0c0;
            color: #000000;
            padding: 16px 48px;
            border-radius: 0;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: none;
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            cursor: pointer;
            box-shadow: none;
        }

        .btn-dashboard:hover {
            transform: none;
            box-shadow: none;
            background: #c0c0c0;
        }

        .btn-dashboard:active {
            transform: none;
            border-color: #808080 #dfdfdf #dfdfdf #808080;
        }

        @media (max-width: 768px) {
            .hero-card {
                padding: 40px 24px;
            }

            h1 {
                font-size: 28px;
            }

            .theme-toggle {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="모드 전환">☀️</button>

    <div class="container">
        <div class="hero-card">
            <h1>김비서를 소개합니다</h1>
            <p class="intro-text">당신의 업무를 더 효율적으로 관리해주는 AI 어시스턴트</p>

            <div class="features">
                <div class="feature-item">
                    <h3>📋 업무 관리</h3>
                    <p>할 일 목록을 한눈에 보고 우선순위별로 정렬해 효율적으로 관리합니다.</p>
                </div>
                <div class="feature-item">
                    <h3>📅 스케줄 관리</h3>
                    <p>주간 일정을 체계적으로 정리하고 중요한 미팅과 마감일을 놓치지 않습니다.</p>
                </div>
                <div class="feature-item">
                    <h3>📊 성과 분석</h3>
                    <p>프로젝트 진행률과 매출 현황을 실시간으로 모니터링하고 의사결정을 돕습니다.</p>
                </div>
            </div>

            <a href="dashboard.html" class="btn-dashboard">내 대시보드 보기</a>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';

        // 초기 테마 설정
        if (savedTheme === 'dark') {
            htmlElement.classList.add('dark-mode');
            themeToggle.textContent = '🌙';
        } else {
            themeToggle.textContent = '☀️';
        }

        // 토글 클릭 이벤트
        themeToggle.addEventListener('click', () => {
            htmlElement.classList.toggle('dark-mode');
            const isDarkMode = htmlElement.classList.contains('dark-mode');
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            themeToggle.textContent = isDarkMode ? '🌙' : '☀️';
        });
    </script>
</body>
</html>
