<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .step-box {
        filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.15));
        transition: all 0.3s ease;
      }

      .step-box:hover {
        filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.25));
      }

      .step-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        font-weight: 600;
        font-size: 14px;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .step-icon {
        font-family: Arial, sans-serif;
        font-size: 18px;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .arrow {
        stroke: rgba(100, 100, 100, 0.5);
        stroke-width: 2;
        fill: none;
        marker-end: url(#arrowhead);
      }
    </style>

    <!-- 화살표 마커 정의 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="rgba(100, 100, 100, 0.5)" />
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="200" fill="transparent" />

  <!-- 화살표 1: 기획 → 제작 -->
  <line x1="145" y1="100" x2="195" y2="100" class="arrow" />

  <!-- 화살표 2: 제작 → 검토 -->
  <line x1="345" y1="100" x2="395" y2="100" class="arrow" />

  <!-- 화살표 3: 검토 → 배포 -->
  <line x1="545" y1="100" x2="595" y2="100" class="arrow" />

  <!-- 화살표 4: 배포 → 분석 -->
  <line x1="745" y1="100" x2="795" y2="100" class="arrow" />

  <!-- 단계 1: 기획 -->
  <g class="step-box">
    <rect x="50" y="50" width="95" height="100" rx="12" ry="12" fill="#FFB3BA" stroke="none" />
    <text x="97.5" y="75" class="step-icon">📋</text>
    <text x="97.5" y="115" class="step-text" fill="#333">기획</text>
  </g>

  <!-- 단계 2: 제작 -->
  <g class="step-box">
    <rect x="200" y="50" width="95" height="100" rx="12" ry="12" fill="#C5B3E8" stroke="none" />
    <text x="247.5" y="75" class="step-icon">🛠️</text>
    <text x="247.5" y="115" class="step-text" fill="#333">제작</text>
  </g>

  <!-- 단계 3: 검토 -->
  <g class="step-box">
    <rect x="400" y="50" width="95" height="100" rx="12" ry="12" fill="#A8E6CF" stroke="none" />
    <text x="447.5" y="75" class="step-icon">✓</text>
    <text x="447.5" y="115" class="step-text" fill="#333">검토</text>
  </g>

  <!-- 단계 4: 배포 -->
  <g class="step-box">
    <rect x="600" y="50" width="95" height="100" rx="12" ry="12" fill="#FFE8A8" stroke="none" />
    <text x="647.5" y="75" class="step-icon">🚀</text>
    <text x="647.5" y="115" class="step-text" fill="#333">배포</text>
  </g>

  <!-- 단계 5: 분석 -->
  <g class="step-box">
    <rect x="750" y="50" width="95" height="100" rx="12" ry="12" fill="#A8D8FF" stroke="none" />
    <text x="797.5" y="75" class="step-icon">📊</text>
    <text x="797.5" y="115" class="step-text" fill="#333">분석</text>
  </g>
</svg>